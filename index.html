<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>네이버 뉴스 키워드 대시보드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --primary:#f54e00; --primary-active:#d04200; --on-primary:#ffffff;
    --ink:#26251e; --body:#5a5852; --muted:#807d72; --muted-soft:#a09c92;
    --hairline:#e6e5e0; --hairline-soft:#efeee8; --hairline-strong:#cfcdc4;
    --canvas:#f7f7f4; --canvas-soft:#fafaf7; --card:#ffffff; --surface-strong:#e6e5e0;
    --success:#1f8a65; --error:#cf2d56;
    --r-xs:4px; --r-sm:6px; --r-md:8px; --r-lg:12px; --r-xl:16px; --r-pill:9999px;
    --sans:"Inter","Pretendard","Malgun Gothic","Apple SD Gothic Neo",system-ui,sans-serif;
    --mono:"JetBrains Mono","Fira Code",monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--sans);
    color:var(--body);background:var(--canvas);font-size:14px;line-height:1.55}
  a{color:inherit;text-decoration:none}
  header.top{background:var(--canvas);color:var(--ink);padding:16px 24px;border-bottom:1px solid var(--hairline);
    display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
  header.top h1{font-size:22px;margin:0;font-weight:400;letter-spacing:-.11px;color:var(--ink)}
  header.top .sub{font-size:13px;color:var(--muted);margin-top:2px}
  .top-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  button{font-family:var(--sans);cursor:pointer;border:none;border-radius:var(--r-md);font-size:14px;font-weight:500;
    padding:10px 18px;height:40px;transition:.15s}
  .btn-primary{background:var(--primary);color:var(--on-primary)}
  .btn-primary:hover{background:var(--primary-active)}
  .btn-primary:disabled{background:var(--muted-soft);cursor:not-allowed}
  .btn-ghost{background:var(--card);color:var(--ink);border:1px solid var(--hairline-strong)}
  .btn-ghost:hover{background:var(--canvas-soft)}
  .btn-line{background:var(--card);color:var(--ink);border:1px solid var(--hairline-strong)}
  .btn-line:hover{background:var(--canvas-soft)}
  .wrap{max-width:1080px;margin:0 auto;padding:20px 24px 60px}
  .panel{background:var(--card);border:1px solid var(--hairline);border-radius:var(--r-lg);
    padding:20px 24px;margin-bottom:20px}
  .panel h2{font-size:11px;margin:0 0 14px;color:var(--muted);font-weight:600;letter-spacing:.88px;
    text-transform:uppercase}
  /* keyword input */
  .kw-add{display:flex;gap:8px;margin-bottom:12px}
  .kw-add input{flex:1;padding:12px 16px;border:1px solid var(--hairline-strong);border-radius:var(--r-md);
    font-size:14px;font-family:inherit;color:var(--ink);background:var(--card)}
  .kw-add input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(245,78,0,.12)}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{display:inline-flex;align-items:center;gap:6px;background:var(--surface-strong);color:var(--ink);
    border:1px solid var(--hairline-strong);border-radius:var(--r-pill);padding:6px 10px 6px 12px;font-size:13px;font-weight:600}
  .chip .x{cursor:pointer;width:16px;height:16px;border-radius:50%;display:grid;place-items:center;
    background:var(--hairline-strong);color:var(--body);font-size:12px;line-height:1}
  .chip .x:hover{background:var(--muted-soft);color:#fff}
  .chip.filter{cursor:pointer;background:var(--card);color:var(--body);border-color:var(--hairline-strong)}
  .chip.filter.active{background:var(--ink);color:var(--canvas);border-color:var(--ink)}
  .empty-kw{color:var(--muted);font-size:13px}
  /* toolbar */
  .toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:14px}
  .seg{display:inline-flex;background:var(--canvas-soft);border:1px solid var(--hairline);border-radius:var(--r-md);padding:3px}
  .seg button{background:transparent;color:var(--muted);padding:7px 16px;height:auto;border-radius:var(--r-sm)}
  .seg button.active{background:var(--card);color:var(--ink);border:1px solid var(--hairline-strong)}
  .meta{font-size:12px;color:var(--muted);font-family:var(--mono)}
  /* period groups */
  .period{margin-bottom:22px}
  .period-head{display:flex;align-items:baseline;gap:10px;padding:10px 0;border-bottom:1px solid var(--hairline-strong);
    margin-bottom:12px;position:sticky;top:0;background:var(--canvas);z-index:2}
  .period-head .label{font-size:22px;font-weight:400;letter-spacing:-.11px;color:var(--ink)}
  .period-head .count{font-size:12px;color:var(--muted-soft);font-weight:500;font-family:var(--mono)}
  .day-sub{font-size:11px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);
    margin:16px 0 8px;padding-left:2px}
  .article{background:var(--card);border:1px solid var(--hairline);border-radius:var(--r-lg);padding:14px 16px;
    margin-bottom:10px;transition:.12s}
  .article:hover{border-color:var(--hairline-strong)}
  .article .a-title{font-size:15px;font-weight:600;color:var(--ink);display:block;margin-bottom:4px;line-height:1.4}
  .article .a-title:hover{color:var(--primary)}
  .article .a-desc{color:var(--body);font-size:13px;margin:4px 0 8px;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .article .a-foot{display:flex;gap:8px;align-items:center;flex-wrap:wrap;font-size:12px;color:var(--muted)}
  .tag{background:var(--canvas-soft);border:1px solid var(--hairline);border-radius:var(--r-xs);padding:2px 7px;
    font-weight:600;color:var(--body);font-size:11px;letter-spacing:.3px}
  .tag.kw{background:var(--surface-strong);color:var(--ink);border-color:var(--hairline-strong)}
  .a-time{color:var(--muted-soft);font-family:var(--mono);font-size:11px}
  .empty-state{text-align:center;padding:64px 20px;color:var(--muted)}
  .empty-state .big{font-size:16px;font-weight:600;color:var(--ink);margin-bottom:8px}
  /* banner */
  .banner{display:flex;gap:10px;align-items:flex-start;background:var(--canvas-soft);border:1px solid var(--hairline);
    border-left:3px solid var(--success);color:var(--body);border-radius:var(--r-lg);padding:12px 16px;
    font-size:13px;margin-bottom:20px}
  .banner.demo{border-left-color:var(--muted-soft)}
  .banner b{font-weight:600;color:var(--ink)}
  /* modal */
  .modal-bg{position:fixed;inset:0;background:rgba(38,37,30,.45);display:none;place-items:center;z-index:50}
  .modal-bg.on{display:grid}
  .modal{background:var(--card);border:1px solid var(--hairline-strong);border-radius:var(--r-xl);
    width:min(520px,92vw);padding:24px 28px}
  .modal h3{margin:0 0 6px;font-size:20px;font-weight:400;letter-spacing:-.2px;color:var(--ink)}
  .modal p{color:var(--muted);font-size:13px;margin:0 0 18px}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.5px;
    text-transform:uppercase;margin-bottom:6px}
  .field input{width:100%;padding:12px 16px;border:1px solid var(--hairline-strong);border-radius:var(--r-md);
    font-size:14px;font-family:inherit;color:var(--ink);background:var(--card)}
  .field input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(245,78,0,.12)}
  .field .hint{font-size:11.5px;color:var(--muted-soft);margin-top:6px}
  .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:10px}
  .spin{width:15px;height:15px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;
    display:inline-block;animation:sp .7s linear infinite;vertical-align:-2px;margin-right:6px}
  @keyframes sp{to{transform:rotate(360deg)}}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--canvas);
    padding:12px 20px;border-radius:var(--r-md);font-size:13px;box-shadow:0 8px 24px rgba(38,37,30,.15);z-index:60;
    opacity:0;pointer-events:none;transition:.25s}
  .toast.on{opacity:1;bottom:34px}
</style>
</head>
<body>
<header class="top">
  <div>
    <h1>📰 네이버 뉴스 키워드 대시보드</h1>
    <div class="sub">키워드별 네이버 뉴스를 월별·일별로 모아 봅니다</div>
  </div>
  <div class="top-actions">
    <button class="btn-ghost" id="btnSettings">⚙ 설정</button>
    <button class="btn-primary" id="btnUpdate">↻ 업데이트</button>
  </div>
</header>

<div class="wrap">
  <div id="banner"></div>

  <!-- 키워드 관리 -->
  <div class="panel">
    <h2>키워드 관리</h2>
    <div class="kw-add">
      <input id="kwInput" type="text" placeholder="키워드를 입력하고 Enter (예: 개인정보보호, 규제개혁)" maxlength="40" />
      <button class="btn-primary" id="kwAdd">추가</button>
    </div>
    <div class="chips" id="kwChips"></div>
  </div>

  <!-- 결과 -->
  <div class="toolbar">
    <div class="seg">
      <button data-view="month" class="active">월별</button>
      <button data-view="day">일별</button>
    </div>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
      <div class="chips" id="filterChips"></div>
      <span class="meta" id="statMeta"></span>
    </div>
  </div>
  <div id="results"></div>
</div>

<!-- 설정 모달 -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3>수집 설정</h3>
    <p>네이버 검색 API 키를 안전하게 보관하는 프록시(Cloudflare Worker) 주소를 입력하세요. 비워두면 <b>데모 모드</b>로 동작합니다.</p>
    <div class="field">
      <label>프록시 URL</label>
      <input id="proxyInput" type="text" placeholder="https://naver-news-proxy.<계정>.workers.dev" />
      <div class="hint">배포 방법은 함께 제공된 README.md를 참고하세요.</div>
    </div>
    <div class="field">
      <label>키워드당 수집 건수 (10~100)</label>
      <input id="displayInput" type="number" min="10" max="100" value="50" />
    </div>
    <div class="modal-actions">
      <button class="btn-line" id="modalCancel">취소</button>
      <button class="btn-primary" id="modalSave">저장</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ===================== 저장소 ===================== */
const LS = {
  kw:'nnd_keywords', proxy:'nnd_proxy', disp:'nnd_display',
  articles:'nnd_articles', filter:'nnd_filter', updated:'nnd_updated'
};
const store = {
  keywords(){ return JSON.parse(localStorage.getItem(LS.kw) || '["개인정보보호","규제개혁"]'); },
  setKeywords(v){ localStorage.setItem(LS.kw, JSON.stringify(v)); },
  proxy(){ return localStorage.getItem(LS.proxy) || ''; },
  setProxy(v){ localStorage.setItem(LS.proxy, v); },
  display(){ return parseInt(localStorage.getItem(LS.disp) || '50',10); },
  setDisplay(v){ localStorage.setItem(LS.disp, String(v)); },
  articles(){ return JSON.parse(localStorage.getItem(LS.articles) || '{}'); },
  setArticles(v){ localStorage.setItem(LS.articles, JSON.stringify(v)); },
  filter(){ return localStorage.getItem(LS.filter) || '__all__'; },
  setFilter(v){ localStorage.setItem(LS.filter, v); },
  updated(){ return localStorage.getItem(LS.updated) || ''; },
  setUpdated(v){ localStorage.setItem(LS.updated, v); }
};
let view = 'month';

/* ===================== 유틸 ===================== */
const $ = s => document.querySelector(s);
function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('on'); setTimeout(()=>t.classList.remove('on'),2200); }
function stripTags(s){ return (s||'').replace(/<[^>]*>/g,'').replace(/&quot;/g,'"').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&#39;/g,"'"); }
function domainOf(url){ try{ return new URL(url).hostname.replace(/^www\./,''); }catch(e){ return ''; } }
function pad(n){ return n<10?'0'+n:''+n; }
function parseDate(pub){ const d=new Date(pub); return isNaN(d)?new Date():d; }
function ymd(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function ym(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1); }
function ymLabel(k){ const [y,m]=k.split('-'); return `${y}년 ${parseInt(m,10)}월`; }
function ymdLabel(k){ const [y,m,d]=k.split('-'); const wd=['일','월','화','수','목','금','토'][new Date(k).getDay()]; return `${parseInt(m,10)}월 ${parseInt(d,10)}일 (${wd})`; }
function timeLabel(d){ return `${pad(d.getHours())}:${pad(d.getMinutes())}`; }
function articleId(a){ return (a.link||a.originallink||a.title); }

/* ===================== 키워드 UI ===================== */
function renderKeywords(){
  const box=$('#kwChips'); const ks=store.keywords();
  if(!ks.length){ box.innerHTML='<span class="empty-kw">등록된 키워드가 없습니다. 위 입력창에서 추가하세요.</span>'; }
  else{
    box.innerHTML = ks.map(k=>`<span class="chip">${escapeHtml(k)}<span class="x" data-kw="${escapeAttr(k)}" title="삭제">✕</span></span>`).join('');
    box.querySelectorAll('.x').forEach(x=>x.onclick=()=>removeKeyword(x.dataset.kw));
  }
  renderFilters();
}
function escapeHtml(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeAttr(s){ return escapeHtml(s); }
function addKeyword(){
  const inp=$('#kwInput'); let v=inp.value.trim();
  if(!v) return;
  const ks=store.keywords();
  if(ks.includes(v)){ toast('이미 등록된 키워드입니다'); return; }
  ks.push(v); store.setKeywords(ks); inp.value=''; renderKeywords();
  toast(`"${v}" 추가됨 · 업데이트를 눌러 수집하세요`);
}
function removeKeyword(k){
  store.setKeywords(store.keywords().filter(x=>x!==k));
  if(store.filter()===k) store.setFilter('__all__');
  renderKeywords(); render();
  toast(`"${k}" 삭제됨`);
}

/* ===================== 필터 ===================== */
function renderFilters(){
  const box=$('#filterChips'); const ks=store.keywords(); const cur=store.filter();
  let html=`<span class="chip filter ${cur==='__all__'?'active':''}" data-f="__all__">전체</span>`;
  html += ks.map(k=>`<span class="chip filter ${cur===k?'active':''}" data-f="${escapeAttr(k)}">${escapeHtml(k)}</span>`).join('');
  box.innerHTML=html;
  box.querySelectorAll('.filter').forEach(c=>c.onclick=()=>{ store.setFilter(c.dataset.f); renderFilters(); render(); });
}

/* ===================== 수집 ===================== */
async function update(){
  const ks=store.keywords();
  if(!ks.length){ toast('먼저 키워드를 추가하세요'); return; }
  const btn=$('#btnUpdate'); btn.disabled=true; const orig=btn.innerHTML;
  btn.innerHTML='<span class="spin"></span>수집 중…';
  const proxy=store.proxy(); const disp=store.display();
  let added=0, failed=[];
  try{
    if(!proxy){
      const demo=demoArticles(ks);
      added=mergeArticles(demo);
    }else{
      for(const k of ks){
        try{
          const url=`${proxy.replace(/\/$/,'')}?query=${encodeURIComponent(k)}&display=${disp}&sort=date`;
          const res=await fetch(url);
          if(!res.ok) throw new Error('HTTP '+res.status);
          const data=await res.json();
          const items=(data.items||[]).map(it=>normalize(it,k));
          added+=mergeArticles(items);
        }catch(e){ failed.push(k); }
      }
    }
    store.setUpdated(new Date().toISOString());
    render(); renderBanner();
    if(failed.length) toast(`수집 완료 · 신규 ${added}건 · 실패 키워드: ${failed.join(', ')}`);
    else toast(`수집 완료 · 신규 ${added}건`);
  }finally{ btn.disabled=false; btn.innerHTML=orig; }
}
function normalize(it,kw){
  return {
    title: stripTags(it.title),
    link: it.link || it.originallink || '',
    source: domainOf(it.originallink||it.link||''),
    pubDate: parseDate(it.pubDate).toISOString(),
    description: stripTags(it.description),
    keyword: kw
  };
}
function mergeArticles(list){
  const cur=store.articles(); let added=0;
  list.forEach(a=>{ const id=articleId(a); if(!cur[id]){ cur[id]=a; added++; } });
  store.setArticles(cur); return added;
}

/* ===================== 렌더 ===================== */
function currentArticles(){
  const all=Object.values(store.articles());
  const f=store.filter();
  const filtered = f==='__all__' ? all : all.filter(a=>a.keyword===f);
  return filtered.sort((a,b)=> new Date(b.pubDate)-new Date(a.pubDate));
}
function render(){
  const arts=currentArticles();
  const res=$('#results');
  $('#statMeta').textContent = arts.length ? `총 ${arts.length.toLocaleString()}건` : '';
  if(!arts.length){
    res.innerHTML=`<div class="empty-state"><div class="big">표시할 뉴스가 없습니다</div>
      상단의 <b>↻ 업데이트</b> 버튼을 눌러 네이버 뉴스를 수집하세요.</div>`;
    return;
  }
  const groups={};
  arts.forEach(a=>{ const d=parseDate(a.pubDate); const key = view==='month'?ym(d):ymd(d);
    (groups[key]=groups[key]||[]).push(a); });
  const keys=Object.keys(groups).sort((a,b)=>b.localeCompare(a));
  let html='';
  keys.forEach(key=>{
    const items=groups[key];
    const label = view==='month'?ymLabel(key):ymdLabel(key);
    html+=`<div class="period"><div class="period-head"><span class="label">${label}</span>
      <span class="count">${items.length}건</span></div>`;
    if(view==='month'){
      const byDay={};
      items.forEach(a=>{ const dk=ymd(parseDate(a.pubDate)); (byDay[dk]=byDay[dk]||[]).push(a); });
      Object.keys(byDay).sort((a,b)=>b.localeCompare(a)).forEach(dk=>{
        html+=`<div class="day-sub">${ymdLabel(dk)} · ${byDay[dk].length}건</div>`;
        byDay[dk].forEach(a=>html+=articleHtml(a));
      });
    }else{
      items.forEach(a=>html+=articleHtml(a));
    }
    html+='</div>';
  });
  res.innerHTML=html;
}
function articleHtml(a){
  const d=parseDate(a.pubDate);
  return `<div class="article">
    <a class="a-title" href="${escapeAttr(a.link)}" target="_blank" rel="noopener">${escapeHtml(a.title)}</a>
    ${a.description?`<div class="a-desc">${escapeHtml(a.description)}</div>`:''}
    <div class="a-foot">
      <span class="tag kw">${escapeHtml(a.keyword)}</span>
      ${a.source?`<span class="tag">${escapeHtml(a.source)}</span>`:''}
      <span class="a-time">${ymd(d)} ${timeLabel(d)}</span>
    </div></div>`;
}
function renderBanner(){
  const b=$('#banner');
  if(!store.proxy()){
    b.innerHTML=`<div class="banner demo">🧪 <div><b>데모 모드입니다.</b> 실제 네이버 뉴스를 수집하려면 <b>⚙ 설정</b>에서 프록시 URL을 입력하세요. (배포 방법: README.md)</div></div>`;
  }else{
    const u=store.updated();
    const when=u?new Date(u).toLocaleString('ko-KR'):'없음';
    b.innerHTML=`<div class="banner">✅ <div>프록시 연결됨 · 마지막 업데이트: <b>${when}</b></div></div>`;
  }
}

/* ===================== 데모 데이터 ===================== */
function demoArticles(ks){
  const sources=['yna.co.kr','yonhapnews.co.kr','hani.co.kr','chosun.com','mk.co.kr','khan.co.kr','donga.com'];
  const now=Date.now(); const out=[];
  ks.forEach((k,ki)=>{
    for(let i=0;i<12;i++){
      const daysAgo=Math.floor(Math.random()*70);
      const d=new Date(now - daysAgo*86400000 - Math.random()*86400000);
      out.push({
        title:`[데모] ${k} 관련 정책 동향 및 현장 반응 ${i+1}`,
        link:`https://example.com/news/${ki}-${i}`,
        originallink:`https://${sources[(ki+i)%sources.length]}/article/${i}`,
        pubDate:d.toUTCString(),
        description:`${k}에 관한 예시 기사 본문입니다. 실제 데이터가 아니며, 프록시 연결 시 네이버 뉴스 실시간 결과로 대체됩니다.`
      });
    }
  });
  return out.map(it=>normalize(it, ks.find(k=>it.title.includes(k))||ks[0]));
}

/* ===================== 설정 모달 ===================== */
function openModal(){ $('#proxyInput').value=store.proxy(); $('#displayInput').value=store.display(); $('#modalBg').classList.add('on'); }
function closeModal(){ $('#modalBg').classList.remove('on'); }
function saveModal(){
  const p=$('#proxyInput').value.trim();
  let d=parseInt($('#displayInput').value,10); if(isNaN(d)) d=50; d=Math.max(10,Math.min(100,d));
  store.setProxy(p); store.setDisplay(d); closeModal(); renderBanner();
  toast(p?'프록시 저장됨':'데모 모드로 저장됨');
}

/* ===================== 이벤트 ===================== */
$('#kwAdd').onclick=addKeyword;
$('#kwInput').addEventListener('keydown',e=>{ if(e.key==='Enter') addKeyword(); });
$('#btnUpdate').onclick=update;
$('#btnSettings').onclick=openModal;
$('#modalCancel').onclick=closeModal;
$('#modalSave').onclick=saveModal;
$('#modalBg').addEventListener('click',e=>{ if(e.target===$('#modalBg')) closeModal(); });
document.querySelectorAll('.seg button').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('.seg button').forEach(x=>x.classList.remove('active'));
  b.classList.add('active'); view=b.dataset.view; render();
});

/* ===================== 초기화 ===================== */
renderKeywords(); render(); renderBanner();
</script>
</body>
</html>
